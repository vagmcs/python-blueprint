name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude PR Review
        id: claude-pr-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a careful PR reviewer. Review the PR diff (gh pr diff) and create
            actionable, inline feedback, without running builds or tests.

            ## Checklist
            Flag issues in the following areas **only when clearly present**:
            - **Correctness** – logic errors, off-by-one errors, incorrect conditions
            - **Type safety** – wrong type annotations, narrowing issues
            - **Security** – hardcoded secrets, unsafe deserialization, SQL/command injection
            - **Performance** – unnecessary allocations, O(n²) patterns, blocking I/O in async code
            - **Design** – duplication, overly long functions/classes, leaky abstractions, and misused design patterns

            ## Output format
            - Use `gh pr comment` to post comment on the PR.
            - Post **inline comments** on the exact lines using the available github tools.
            - For each issue, state the problem, explain why it matters, and suggest a fix.
            - If a code change is warranted, include it as a minimal unified diff in a fenced block.
            - Write a short **summary comment** on the PR including overall assessment, critical issues (if any).
            - Be concise. Skip praise. Do not invent issues that are not in the diff.

          # CLI flags for models, max turns, system prompts, tool access, etc.
          claude_args: |
            --model claude-sonnet-4-6
            ---allowedTools mcp__github_inline_comment__create_inline_comment,Write,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)

          # Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')
